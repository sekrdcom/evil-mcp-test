name: Sekrd Security Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sekrd Security Scan
        uses: sekrdcom/sekrd@main
        with:
          url: 'https://github.com/sekrdcom/evil-mcp-test'
          api-key: ${{ secrets.SEKRD_API_KEY }}
          fail-on: 'critical'
